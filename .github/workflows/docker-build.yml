name: Build & Push Docker Images

on:
  push:
    branches: [staging]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/thesocialchicken/beergame-backend
  FRONTEND_IMAGE: ghcr.io/thesocialchicken/beergame-frontend

jobs:
  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/Dockerfile.backend
          push: true
          tags: ${{ env.BACKEND_IMAGE }}:staging,${{ env.BACKEND_IMAGE }}:${{ github.sha }}

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: frontend
          file: frontend/Dockerfile
          push: true
          tags: ${{ env.FRONTEND_IMAGE }}:staging,${{ env.FRONTEND_IMAGE }}:${{ github.sha }}

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Deploy to server
        run: |
          ssh -o StrictHostKeyChecking=no root@${{ secrets.SERVER_HOST }} "
            mkdir -p /opt/beergame-classic
            cd /opt/beergame-classic
            docker pull ghcr.io/thesocialchicken/beergame-backend:staging
            docker pull ghcr.io/thesocialchicken/beergame-frontend:staging
          "
          scp -o StrictHostKeyChecking=no \
            infra/docker/docker-compose.staging.yml \
            root@${{ secrets.SERVER_HOST }}:/opt/beergame-classic/docker-compose.yml
          ssh -o StrictHostKeyChecking=no root@${{ secrets.SERVER_HOST }} "
            cd /opt/beergame-classic
            docker compose up -d --remove-orphans
            docker compose ps
          "
