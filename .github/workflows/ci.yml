name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main, staging]
  workflow_call:

jobs:
  test-backend:
    name: Backend Tests (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Lint with ruff
        run: uv run ruff check core/ backend/ variants/

      - name: Format check with black
        run: uv run black --check core/ backend/ variants/

      - name: Run tests
        run: uv run pytest tests/ -v --cov=core --cov-report=xml --cov-fail-under=80

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          flags: backend
        continue-on-error: true

  test-frontend:
    name: Frontend Tests (SvelteKit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check frontend exists
        id: frontend-check
        run: |
          if [ -f "frontend/package.json" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "No frontend yet — skipping"
          fi

      - name: Set up Node
        if: steps.frontend-check.outputs.exists == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        if: steps.frontend-check.outputs.exists == 'true'
        run: npm install
        working-directory: frontend

      - name: Type check
        if: steps.frontend-check.outputs.exists == 'true'
        run: npm run check
        working-directory: frontend

      - name: Lint
        if: steps.frontend-check.outputs.exists == 'true'
        run: npm run lint
        working-directory: frontend

      - name: Unit tests
        if: steps.frontend-check.outputs.exists == 'true'
        run: npm run test:unit
        working-directory: frontend

  test-e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Check frontend exists
        id: frontend-check
        run: |
          if [ -f "frontend/package.json" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Node
        if: steps.frontend-check.outputs.exists == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install Python deps
        run: uv sync --extra dev

      - name: Install frontend deps
        if: steps.frontend-check.outputs.exists == 'true'
        run: npm install
        working-directory: frontend

      - name: Install Playwright browsers
        if: steps.frontend-check.outputs.exists == 'true'
        run: npx playwright install --with-deps
        working-directory: frontend

      - name: Run E2E tests
        if: steps.frontend-check.outputs.exists == 'true'
        run: npm run test:e2e
        working-directory: frontend

      - name: Upload Playwright report
        if: always() && steps.frontend-check.outputs.exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

  lint-ansible:
    name: Ansible Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ansible-lint
        run: pip install ansible-lint
      - name: Lint playbooks
        run: ansible-lint infra/ansible/
        continue-on-error: true
