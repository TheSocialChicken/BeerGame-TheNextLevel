name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main, staging]

jobs:
  test-backend:
    name: Backend Tests (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras --dev
        working-directory: core

      - name: Lint with ruff
        run: uv run ruff check .
        working-directory: core

      - name: Format check with black
        run: uv run black --check .
        working-directory: core

      - name: Run tests
        run: uv run pytest tests/ -v --cov=. --cov-report=xml --cov-fail-under=80
        working-directory: core

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: core/coverage.xml
          flags: backend

  test-frontend:
    name: Frontend Tests (SvelteKit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Type check
        run: npm run check
        working-directory: frontend

      - name: Lint
        run: npm run lint
        working-directory: frontend

      - name: Unit tests
        run: npm run test:unit
        working-directory: frontend

  test-e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    # Only run e2e on PRs to staging/main to save CI time
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install Python dependencies
        run: uv sync --all-extras --dev
        working-directory: core

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Install Playwright browsers
        run: npx playwright install --with-deps
        working-directory: frontend

      - name: Run E2E tests
        run: npm run test:e2e
        working-directory: frontend

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

  lint-ansible:
    name: Ansible Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ansible-lint
        run: pip install ansible-lint

      - name: Lint playbooks
        run: ansible-lint infra/ansible/
        continue-on-error: true  # Remove once playbooks are mature
