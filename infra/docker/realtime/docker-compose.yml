services:
  backend-realtime:
    build:
      context: ../../..
      dockerfile: infra/docker/realtime/Dockerfile.backend
    ports:
      - "8001:8001"
    environment:
      - PYTHONPATH=/app
    volumes:
      - ../../../core:/app/core
      - ../../../variants/realtime:/app/variants/realtime

  frontend:
    build:
      context: ../../..
      dockerfile: infra/docker/classic/Dockerfile.frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8001
      - VITE_WS_URL=ws://localhost:8001
    depends_on:
      - backend-realtime
