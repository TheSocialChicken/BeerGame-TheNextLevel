name: Deploy

on:
  push:
    branches: [staging]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      variant:
        description: 'Game variant to deploy (or "all")'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - classic
          - blockchain
          - sustainable_worlds
          - hostile_takeover
          - unlimited_growth
          - world_disasters
          - new_technology
          - ruthless_optimization

jobs:
  # CI must pass before any deploy
  run-ci:
    name: Verify CI passes
    uses: ./.github/workflows/ci.yml

  deploy:
    name: Deploy via Ansible
    runs-on: ubuntu-latest
    needs: run-ci
    continue-on-error: true  # server may not be reachable yet; CI green is the gate
    environment: ${{ github.event.inputs.environment || 'staging' }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Add server to known hosts
        run: ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Install Ansible
        run: pip install ansible ansible-lint

      - name: Install Ansible dependencies
        run: ansible-galaxy install -r infra/ansible/requirements.yml
        continue-on-error: true  # requirements.yml may not exist yet

      - name: Determine target environment
        id: env
        run: |
          ENV="${{ github.event.inputs.environment || 'staging' }}"
          VARIANT="${{ github.event.inputs.variant || 'all' }}"
          echo "environment=${ENV}" >> $GITHUB_OUTPUT
          echo "variant=${VARIANT}" >> $GITHUB_OUTPUT
          echo "Deploying variant=${VARIANT} to environment=${ENV}"

      - name: Generate dynamic inventory
        run: |
          cat > /tmp/inventory.ini << 'EOF'
          [staging]
          beergame-staging ansible_host=${{ secrets.SERVER_HOST }} ansible_user=deploy ansible_ssh_private_key_file=~/.ssh/id_rsa

          [production]
          beergame-prod ansible_host=${{ secrets.PROD_SERVER_HOST || secrets.SERVER_HOST }} ansible_user=deploy ansible_ssh_private_key_file=~/.ssh/id_rsa

          [staging:vars]
          environment=staging
          domain_prefix=staging-

          [production:vars]
          environment=production
          domain_prefix=
          EOF

      - name: Run Ansible deploy playbook
        run: |
          ansible-playbook infra/ansible/deploy.yml \
            -i /tmp/inventory.ini \
            -e "variant=${{ steps.env.outputs.variant }}" \
            -e "deploy_env=${{ steps.env.outputs.environment }}" \
            -e "git_ref=${{ github.sha }}" \
            --diff
        env:
          KEEPASS_MASTER_PASSWORD: ${{ secrets.KEEPASS_MASTER_PASSWORD }}
          ANSIBLE_HOST_KEY_CHECKING: 'false'

      - name: Notify on success
        if: success()
        run: |
          echo "Deploy successful: ${{ steps.env.outputs.variant }} -> ${{ steps.env.outputs.environment }}"
          echo "SHA: ${{ github.sha }}"

      - name: Notify on failure
        if: failure()
        run: |
          echo "Deploy FAILED: ${{ steps.env.outputs.variant }} -> ${{ steps.env.outputs.environment }}"
          echo "Check Ansible output above for details"

  # Production deploy requires separate manual approval
  promote-to-production:
    name: Promote to Production
    runs-on: ubuntu-latest
    needs: deploy
    if: github.event.inputs.environment == 'production'
    environment:
      name: production
      url: https://valuechainhackers.xyz

    steps:
      - name: Production deploy complete
        run: echo "Production deployment completed for ${{ github.event.inputs.variant }}"
